<!DOCTYPE html>
<html>
<head>
  <title>Country Explorer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Country Explorer</h1>

  <input type="text" id="search" placeholder="Search country..." onkeyup="searchCountry()">

  <div>
    <button onclick="filterRegion('Asia')">Asia</button>
    <button onclick="filterRegion('Europe')">Europe</button>
    <button onclick="showAll()">All</button>
    <button onclick="sortPopulation()">Sort by Population</button>
    <button onclick="toggleTheme()">Toggle Theme</button>
  </div>

  <div id="countries"></div>

  <script src="script.js"></script>
</body>
</html>
